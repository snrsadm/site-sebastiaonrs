<style>

  .question { background: rgba(255,255,255,0.03); border-radius: 10px; padding: 16px; margin-bottom: 12px; border: 1px solid rgba(255,255,255,0.06); }
  .q-text { font-size: 14px; color: var(--ivory-bright); line-height: 1.5; margin-bottom: 12px; font-weight: 500; }
  .opts { display: flex; flex-direction: column; gap: 7px; }
  .opt { padding: 10px 14px; border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; font-size: 13px; color: var(--slate); cursor: pointer; background: rgba(255,255,255,0.02); line-height: 1.5; text-align: left; transition: all 0.15s; }
  .opt:hover { border-color: var(--gold); color: var(--gold-bright); background: var(--gold-dim2); }
  .opt.sel { border-color: var(--gold); color: var(--gold-bright); background: var(--gold-dim); font-weight: 600; }
  .tnav { display: flex; justify-content: space-between; align-items: center; margin-top: 22px; }

  .tbtn:hover { background: rgba(255,255,255,0.09); color: var(--ivory-bright); }
  .tbtn.primary { background: var(--gold); color: var(--navy); border-color: var(--gold); font-weight: 700; }
  .tbtn.primary:hover { opacity: 0.88; }

  .step-ind { font-size: 12px; color: var(--slate-dim); }
  .intro-list { display: flex; flex-direction: column; gap: 10px; margin: 22px 0 28px; }
  .intro-item { display: flex; align-items: flex-start; gap: 12px; font-size: 13px; color: var(--slate); line-height: 1.6; }
  .intro-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--gold); margin-top: 7px; flex-shrink: 0; }
  .intro-privacy { background: var(--gold-dim2); border: 1px solid rgba(196,164,100,0.2); border-radius: 10px; padding: 14px 16px; font-size: 12.5px; color: var(--slate); line-height: 1.6; margin-bottom: 24px; }
  .intro-privacy strong { color: var(--gold-bright); }
  .r-badge { display: inline-block; padding: 6px 20px; border-radius: 20px; font-size: 13px; font-weight: 600; margin-bottom: 12px; }
  .r-title { font-size: 24px; font-weight: 700; margin-bottom: 8px; font-family: var(--font-display); }
  .r-sub { font-size: 14px; color: var(--slate); line-height: 1.7; margin-bottom: 24px; }
  .bar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .bar-label { font-size: 13px; color: var(--slate); width: 210px; flex-shrink: 0; }
  .bar-track { flex: 1; height: 8px; background: rgba(255,255,255,0.06); border-radius: 4px; overflow: hidden; }
  .bar-fill { height: 8px; border-radius: 4px; background: var(--gold); }
  .bar-val { font-size: 12px; color: var(--slate-dim); width: 34px; text-align: right; }
  .tag-fail { font-size: 11px; padding: 1px 8px; border-radius: 20px; background: var(--danger-dim); color: var(--danger-text); margin-left: 6px; font-weight: 500; }
  .tag-ok { font-size: 11px; padding: 1px 8px; border-radius: 20px; background: var(--gold-dim); color: var(--gold-bright); margin-left: 6px; font-weight: 500; }
  .alerta-wrap { background: var(--danger-dim); border: 1px solid rgba(226,115,75,0.3); border-radius: 10px; padding: 18px; margin: 16px 0; }
  .alerta-titulo { font-size: 14px; font-weight: 600; color: var(--danger-text); margin-bottom: 10px; }
  .alerta-texto { font-size: 13px; color: var(--danger-text); line-height: 1.7; opacity: 0.9; }
  .ok-box { background: var(--gold-dim); border: 1px solid rgba(196,164,100,0.3); border-radius: 10px; padding: 18px; margin: 16px 0; }
  .ok-titulo { font-size: 14px; font-weight: 600; color: var(--gold-bright); margin-bottom: 6px; }

  .tcta-box p { font-size: 13px; color: var(--slate); margin-bottom: 16px; line-height: 1.6; }
  .treiniciar { margin-top: 14px; font-size: 12px; color: var(--slate-dim); cursor: pointer; background: none; border: none; text-decoration: underline; display: block; margin-left: auto; margin-right: auto; font-family: var(--font-body); }
  .platform-nav { display: flex; flex-direction: column; gap: 8px; margin-top: 18px; padding-top: 18px; border-top: 1px solid rgba(255,255,255,0.08); }
  .platform-item { display: flex; align-items: center; justify-content: space-between; padding: 10px 14px; border-radius: 8px; background: rgba(255,255,255,0.02); font-size: 13px; }
  .platform-item a { color: var(--gold-bright); text-decoration: none; font-weight: 600; }
  .platform-item a:hover { text-decoration: underline; }
  .platform-tag { font-size: 11px; color: var(--slate-dim); }
  footer { text-align: center; margin-top: 28px; font-size: 12px; color: var(--slate-dim); }
  footer a { color: var(--slate); text-decoration: none; }
  footer a:hover { color: var(--gold-bright); }
  @media (max-width: 600px) {
    body { padding: 24px 14px; }
    .tool-wrapper { padding: 22px; }
    .bar-label { width: 130px; font-size: 12px; }
  }
</style>

<body>
<div class="page-wrap">
  <div class="page-header">
    <div class="page-eyebrow">IME · Índice de Maturidade Executiva</div>
    <div class="page-title">Clareza Estratégica</div>
    <p class="page-sub">A empresa sabe para onde vai? Um diagnóstico de 7 dimensões para revelar o quanto sua estratégia é clara, compartilhada e consistente.</p>
  </div>
  <div class="tool-wrapper">
    <div class="tool-body" id="tool-root"></div>
  </div>
  <footer>© 2026 Sebastião Nunes · <a href="https://www.linkedin.com/in/sebastiao-nunes-rocha-de-souza" target="_blank">LinkedIn</a> · <a href="index.html">sebastiaonrs.com.br</a></footer>
</div>
<script>
var DIMS=[
  {id:"proposito",title:"Propósito e Visão",desc:"Por que a empresa existe e onde quer chegar?",icon:"🧭",critica:false,
    perguntas:[
      {text:"A empresa tem uma declaração de propósito/visão formalizada?",opts:["Não existe visão declarada ou ela é ignorada no dia a dia.","Existe uma visão declarada, mas pouco lida ou aplicada.","A visão é conhecida pela liderança e referenciada ocasionalmente em decisões.","A visão é referência ativa em decisões estratégicas e reconhecida por toda a organização."]},
      {text:"Quando questionados separadamente, os principais executivos descrevem o propósito da empresa...",opts:["De formas claramente diferentes e às vezes contraditórias.","De formas parecidas, mas com ênfases distintas.","De forma consistente, com pequenas variações de linguagem.","De forma praticamente idêntica, com a mesma essência."]},
      {text:"A visão de longo prazo da empresa é revisitada...",opts:["Nunca, ou apenas quando exigido por processo formal burocrático.","Esporadicamente, sem cadência definida.","Anualmente, como parte do ciclo de planejamento.","Regularmente, e usada como critério ativo de avaliação de novas iniciativas."]}
    ]},
  {id:"direcionamento",title:"Direcionamento Estratégico",desc:"As prioridades e pilares estão definidos?",icon:"🎯",critica:false,
    perguntas:[
      {text:"As prioridades estratégicas da empresa para os próximos 2-3 anos estão...",opts:["Não definidas ou definidas apenas informalmente.","Definidas, mas de forma genérica (\"crescer\", \"inovar\"), sem detalhamento.","Definidas com objetivos específicos, mas nem todos mensuráveis.","Definidas com objetivos específicos, mensuráveis e com donos claros."]},
      {text:"Quando um novo projeto ou investimento é proposto, a organização avalia sua aderência à estratégia...",opts:["Raramente ou nunca — decisões são tomadas caso a caso.","De forma informal, dependendo de quem está decidindo.","Com um processo estabelecido, mas nem sempre seguido.","Com um processo estabelecido e consistentemente aplicado."]},
      {text:"Os pilares estratégicos da empresa foram definidos...",opts:["Não existem pilares estratégicos definidos.","Existem, mas foram copiados/herdados sem adaptação à realidade da empresa.","Foram definidos com análise própria, mas sem revisão desde então.","Foram definidos com análise rigorosa e são revisados periodicamente."]}
    ]},
  {id:"posicionamento",title:"Posicionamento Competitivo",desc:"A diferenciação frente à concorrência é clara?",icon:"♟️",critica:false,
    perguntas:[
      {text:"A proposta de valor da empresa frente aos concorrentes é...",opts:["Não está clara nem para a liderança.","Está clara para a liderança, mas não é comunicada de forma consistente.","Está clara e comunicada, mas pouco diferenciada de concorrentes.","Está clara, comunicada e genuinamente diferenciada no mercado."]},
      {text:"A empresa monitora ativamente o posicionamento dos concorrentes...",opts:["Não monitora ou monitora de forma esporádica/informal.","Monitora informalmente, sem processo estruturado.","Tem um processo estruturado, mas usado de forma reativa.","Tem um processo estruturado e usa a informação proativamente nas decisões."]},
      {text:"Se perguntado a um cliente por que ele escolhe a empresa em vez de um concorrente, a liderança...",opts:["Não sabe responder com confiança.","Tem uma hipótese, mas nunca validou com clientes reais.","Tem uma resposta validada, mas desatualizada.","Tem uma resposta clara, validada e atualizada continuamente."]}
    ]},
  {id:"lideranca",title:"Alinhamento da Liderança",desc:"O time executivo compartilha o mesmo entendimento?",icon:"🤝",critica:true,
    alerta:"Sem alinhamento entre os membros da liderança, nenhuma outra dimensão sustenta maturidade real. É o padrão de falha estratégica mais comum e mais silencioso em empresas brasileiras: discurso comum no papel, divergência real na hora de decidir.",
    perguntas:[
      {text:"Os membros da liderança, quando questionados individualmente sobre as prioridades da empresa...",opts:["Dão respostas claramente diferentes entre si.","Têm um discurso comum, mas divergem quando decisões concretas precisam ser tomadas.","Estão alinhados na maior parte das decisões, com raras exceções.","Demonstram alinhamento consistente, inclusive sob pressão ou em decisões de trade-off."]},
      {text:"Diante de uma decisão estratégica difícil (cortar um produto, mudar de mercado), a liderança...",opts:["Frequentemente trava por falta de consenso ou disputas de poder.","Chega a um consenso, mas com desgaste e demora significativos.","Chega a um consenso de forma relativamente ágil na maioria das vezes.","Decide de forma ágil e alinhada, mesmo em temas sensíveis."]},
      {text:"Conflitos entre áreas sobre prioridades estratégicas são...",opts:["Frequentes e não resolvidos, gerando trabalho duplicado ou contraditório.","Frequentes, mas resolvidos caso a caso pela hierarquia.","Raros, pois há entendimento comum sobre prioridades.","Praticamente inexistentes, pois a estratégia funciona como critério compartilhado de decisão."]}
    ]},
  {id:"disseminacao",title:"Disseminação e Compreensão",desc:"A estratégia é conhecida além do C-level?",icon:"📣",critica:false,
    perguntas:[
      {text:"Se perguntado a um gerente de nível médio qual é a estratégia da empresa, ele...",opts:["Não saberia responder ou daria uma resposta genérica.","Saberia responder parcialmente, com lacunas relevantes.","Saberia responder com razoável precisão.","Saberia responder com precisão e conectar ao seu trabalho diário."]},
      {text:"A estratégia da empresa é comunicada aos times...",opts:["Não é comunicada de forma estruturada.","É comunicada uma vez (ex: reunião anual), sem reforço.","É comunicada e reforçada periodicamente.","É comunicada, reforçada e traduzida em metas específicas para cada time."]},
      {text:"Colaboradores conseguem explicar como o trabalho deles contribui para a estratégia da empresa...",opts:["Não, a maioria não vê conexão entre seu trabalho e a estratégia.","Apenas lideranças conseguem fazer essa conexão.","A maioria dos gestores consegue, mas não os times operacionais.","A maioria dos colaboradores, em todos os níveis, consegue fazer essa conexão."]}
    ]},
  {id:"foco",title:"Foco e Priorização",desc:"A empresa consegue dizer não e evitar dispersão?",icon:"🔍",critica:false,
    perguntas:[
      {text:"Quando surgem oportunidades atrativas fora do escopo estratégico definido, a empresa...",opts:["Costuma persegui-las mesmo assim, gerando dispersão frequente.","Às vezes persegue, dependendo de quem propõe ou pressiona.","Avalia com critério, mas ocasionalmente cede à dispersão.","Avalia com critério rigoroso e recusa com disciplina o que foge do foco."]},
      {text:"O número de iniciativas estratégicas em andamento simultaneamente é...",opts:["Muito alto, sem capacidade real de acompanhar todas.","Alto, com sobrecarga perceptível das equipes.","Administrável, com atenção adequada à maioria.","Calibrado à capacidade real de execução da organização."]},
      {text:"Decisões de \"parar de fazer algo\" (descontinuar produtos, projetos, mercados) são...",opts:["Raras — a empresa tende a acumular iniciativas sem encerrar as antigas.","Acontecem, mas de forma reativa a crises.","Acontecem como parte do planejamento, mas com resistência.","Fazem parte natural da disciplina estratégica da empresa."]}
    ]},
  {id:"consistencia",title:"Consistência ao Longo do Tempo",desc:"A estratégia se mantém estável diante de pressões?",icon:"⏳",critica:false,
    perguntas:[
      {text:"Nos últimos 2-3 anos, as prioridades estratégicas da empresa...",opts:["Mudaram com frequência, sem lógica clara de continuidade.","Mudaram algumas vezes, geralmente por pressão externa.","Se mantiveram em geral, com ajustes pontuais justificados.","Se mantiveram coerentes, com evolução clara e intencional."]},
      {text:"Trocas de liderança (executivos, diretores) na empresa costumam...",opts:["Provocar mudanças bruscas de direção estratégica.","Gerar alguma instabilidade nas prioridades por um período.","Ter impacto limitado na estratégia geral.","Não afetar a coerência estratégica, que é maior que qualquer indivíduo."]},
      {text:"Comparando o discurso estratégico da empresa hoje com o de dois anos atrás, percebe-se...",opts:["Pouca ou nenhuma relação entre os dois.","Alguma relação, mas com mudanças relevantes de direção.","Uma evolução natural, mantendo a essência.","Uma continuidade clara, com aprofundamento e refinamento ao longo do tempo."]}
    ]}
];
var curD=0;
var respostas=[];
for(var i=0;i<DIMS.length;i++){respostas.push([null,null,null]);}
function R(id){return document.getElementById(id);}
function renderTool(html){R("tool-root").innerHTML=html;}
function telaIntro(){
  var html="<h2>Antes de começar</h2>";
  html+="<div class='intro-list'>";
  html+="<div class='intro-item'><div class='intro-dot'></div>7 dimensões, 3 perguntas cada — cerca de 10 minutos.</div>";
  html+="<div class='intro-item'><div class='intro-dot'></div>Escolha a afirmação mais próxima da realidade da sua empresa, não a ideal.</div>";
  html+="<div class='intro-item'><div class='intro-dot'></div>O resultado aparece imediatamente na tela ao final.</div>";
  html+="</div>";
  html+="<div class='intro-privacy'><strong>Privacidade:</strong> este diagnóstico não pede nome, e-mail ou empresa, e nenhuma resposta é armazenada em servidor algum. Todo o cálculo acontece no seu navegador — ao fechar a página, nada permanece.</div>";
  html+="<div class='tnav'><div></div><button class='tbtn primary' id='btn-intro-next'>Iniciar diagnóstico →</button></div>";
  renderTool(html);
  R("btn-intro-next").addEventListener("click",function(){curD=0;respostas=[];for(var i=0;i<DIMS.length;i++){respostas.push([null,null,null]);}renderDim();});
}
function renderDim(){
  var d=DIMS[curD];
  var pct=Math.round(((curD+1)/DIMS.length)*100);
  var html="<div class='prog-label'>Dimensão "+(curD+1)+" de "+DIMS.length+"</div>";
  html+="<div class='prog-bar'><div class='prog-fill' style='width:"+pct+"%'></div></div>";
  html+="<div class='dim-header'><div class='dim-icon'>"+d.icon+"</div><div><div class='dim-title'>"+d.title+(d.critica?"<span class='critica-tag'>dimensão crítica</span>":"")+"</div><div class='dim-desc'>"+d.desc+"</div></div></div>";
  d.perguntas.forEach(function(q,qi){
    html+="<div class='question'><div class='q-text'>"+q.text+"</div><div class='opts'>";
    q.opts.forEach(function(op,oi){
      var s=(respostas[curD][qi]===(oi+1))?" sel":"";
      html+="<div class='opt"+s+"' data-qi='"+qi+"' data-val='"+(oi+1)+"'>"+op+"</div>";
    });
    html+="</div></div>";
  });
  html+="<div class='tnav'>";
  html+="<button class='tbtn' id='btn-back'"+(curD===0?" disabled":"")+"'>← Anterior</button>";
  html+="<span class='step-ind'>"+(curD+1)+"/"+DIMS.length+"</span>";
  html+="<button class='tbtn primary' id='btn-next'>"+(curD===DIMS.length-1?"Ver resultado →":"Próxima →")+"</button>";
  html+="</div>";
  renderTool(html);
  document.querySelectorAll("#tool-root .opt").forEach(function(el){
    el.addEventListener("click",function(){
      respostas[curD][parseInt(this.dataset.qi)]=parseInt(this.dataset.val);
      renderDim();
    });
  });
  R("btn-next").addEventListener("click",function(){
    if(respostas[curD].some(function(r){return r===null;})){alert("Responda todas as perguntas antes de continuar.");return;}
    if(curD<DIMS.length-1){curD++;renderDim();}else{mostrarResultado();}
  });
  R("btn-back").addEventListener("click",function(){if(curD>0){curD--;renderDim();}});
}
function dimScore(di){var s=0;respostas[di].forEach(function(v){s+=v||0;});return Math.round((s/respostas[di].length)*10)/10;}
function nivelInfo(sc){
  if(sc<1.8)return{label:"Difusa",bg:"rgba(226,115,75,0.18)",txt:"#F0AE8C"};
  if(sc<2.5)return{label:"Emergente",bg:"rgba(239,159,39,0.18)",txt:"#F5C87A"};
  if(sc<3.2)return{label:"Em Desenvolvimento",bg:"rgba(196,164,100,0.16)",txt:"#E8C87A"};
  if(sc<3.8)return{label:"Consolidada",bg:"rgba(196,164,100,0.22)",txt:"#E8C87A"};
  return{label:"Referência",bg:"rgba(196,164,100,0.3)",txt:"#F8F7F4"};
}
function mostrarResultado(){
  var scores=DIMS.map(function(_,i){return dimScore(i);});
  var media=Math.round((scores.reduce(function(a,b){return a+b;},0)/scores.length)*10)/10;
  var liIdx=DIMS.findIndex(function(d){return d.critica;});
  var liScore=scores[liIdx];
  var gated=liScore<2.5;
  var nv=nivelInfo(media);
  if(gated&&media>=3.2){nv=nivelInfo(3.1);} // aplica o teto de "Em Desenvolvimento"
  var dimRows=scores.map(function(s,i){
    var pct=Math.round((s/4)*100);
    var tag=DIMS[i].critica?(s<2.5?"<span class='tag-fail'>crítica — abaixo do mínimo</span>":"<span class='tag-ok'>crítica — ok</span>"):"";
    return "<div class='bar-row'><div class='bar-label'>"+DIMS[i].title+tag+"</div><div class='bar-track'><div class='bar-fill' style='width:"+pct+"%'></div></div><div class='bar-val'>"+s+"/4</div></div>";
  }).join("");
  var fb="";
  if(gated){
