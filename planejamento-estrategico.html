  {id:"metodologia",title:"Metodologia de Planejamento",desc:"Existe um processo estruturado, ou cada ciclo começa do zero?",icon:"🗺️",critica:false,

  {id:"desdobramento",title:"Desdobramento em Metas e Iniciativas",desc:"A estratégia vira projetos e metas concretas, ou fica só no discurso?",icon:"🎯",critica:true,

    perguntas:[

    ],
    niveis:{

      medio:{texto:"Existe alguma revisão, mas ainda irregular — o que atrasa a percepção de desvios e a correção de rota.",acao:"Transforme a revisão estratégica em um compromisso de agenda fixo da liderança, não em algo que acontece \"quando dá tempo\"."},

    ],
    niveis:{

      medio:{texto:"Existem indicadores, mas dispersos ou de acesso difícil — a liderança não os consulta com a regularidade necessária para agir a tempo.",acao:"Centralize os indicadores estratégicos em um único painel, ainda que simples, e leve-o para toda reunião de revisão."},

    perguntas:[
      {text:"Quando o cenário externo muda de forma relevante (economia, concorrência, tecnologia), o plano estratégico da empresa...",opts:["Permanece o mesmo até o próximo ciclo anual, mesmo que já não faça sentido.","É ajustado de forma reativa e tardia, geralmente sob pressão de uma crise.","É revisado e ajustado dentro de um prazo razoável.","É ajustado com agilidade, como parte natural do processo de gestão estratégica."]},
      {text:"A empresa tem mecanismos para antecipar mudanças relevantes no ambiente de negócio...",opts:["Não — as mudanças pegam a empresa de surpresa quase sempre.","Alguns sinais são percebidos, mas de forma informal e sem processo estruturado.","Existe algum monitoramento estruturado do ambiente externo (mercado, concorrência, tendências).","Existe um processo estruturado de monitoramento e cenários, que alimenta ajustes proativos no plano."]},

    ],
    niveis:{
      baixo:{texto:"O plano estratégico tende a ficar rígido até o fim do ciclo mesmo quando o contexto muda — o custo de não se adaptar aparece tarde, geralmente como uma crise.",acao:"Inclua, na próxima revisão estratégica, uma pergunta fixa: \"o que mudou lá fora que deveria mudar o nosso plano?\""},
      medio:{texto:"A empresa consegue ajustar o plano, mas normalmente de forma reativa, depois que a pressão externa já se tornou evidente.",acao:"Crie um monitoramento simples de 3 a 5 sinais externos relevantes (mercado, concorrência, tecnologia) para antecipar ajustes."},
      alto:{texto:"A empresa já trata a correção de rota como parte natural da gestão estratégica, não como um sinal de fracasso.",acao:"Preserve essa cultura de adaptação formalizando-a como parte explícita do processo de planejamento, para que sobreviva a trocas de liderança."}

var SHORT_LABELS=["Metodologia","Desdobramento","Recursos","Portfólio","Revisão","Indicadores","Adaptação"];
function buildRadarSVG(labels,scores,criticalIdx){
  var n=labels.length;
  var size=320,center=size/2,maxR=center-72;
  function pt(i,ratio){
    var angle=(Math.PI*2*i/n)-Math.PI/2;
    return [center+ratio*maxR*Math.cos(angle),center+ratio*maxR*Math.sin(angle)];
  }
  var svg="<svg viewBox='0 0 "+size+" "+size+"' class='radar-svg'>";
  [1,2,3,4].forEach(function(level){
    var ratio=level/4,pts=[];
    for(var i=0;i<n;i++){var p=pt(i,ratio);pts.push(p[0].toFixed(1)+","+p[1].toFixed(1));}
    svg+="<polygon points='"+pts.join(" ")+"' class='radar-grid'/>";
  });
  for(var i=0;i<n;i++){
    var p=pt(i,1);
    svg+="<line x1='"+center+"' y1='"+center+"' x2='"+p[0].toFixed(1)+"' y2='"+p[1].toFixed(1)+"' class='radar-axis'/>";
  }
  var dpts=[];
  for(var i=0;i<n;i++){var ratio=scores[i]/4;var p=pt(i,ratio);dpts.push(p[0].toFixed(1)+","+p[1].toFixed(1));}
  svg+="<polygon points='"+dpts.join(" ")+"' class='radar-data'/>";
  for(var i=0;i<n;i++){var ratio=scores[i]/4;var p=pt(i,ratio);svg+="<circle cx='"+p[0].toFixed(1)+"' cy='"+p[1].toFixed(1)+"' r='4' class='radar-dot"+(i===criticalIdx?" radar-dot-critical":"")+"'/>";}
  for(var i=0;i<n;i++){
    var p=pt(i,1.24);
    var anchor="middle";
    if(p[0]<center-12)anchor="end"; else if(p[0]>center+12)anchor="start";
    svg+="<text x='"+p[0].toFixed(1)+"' y='"+p[1].toFixed(1)+"' text-anchor='"+anchor+"' class='radar-label"+(i===criticalIdx?" radar-label-critical":"")+"' dominant-baseline='middle'>"+labels[i]+"</text>";
  }
  svg+="</svg>";
  return svg;
}
var curD=0;
var respostas=[];
for(var i=0;i<DIMS.length;i++){respostas.push([null,null,null]);}
function R(id){return document.getElementById(id);}
function renderTool(html){R("tool-root").innerHTML=html;}
function telaIntro(){
  var html="<h2>Antes de começar</h2>";
  html+="<div class='intro-list'>";
  html+="<div class='intro-item'><div class='intro-dot'></div>7 dimensões, 3 perguntas cada — cerca de 10 minutos.</div>";
  html+="<div class='intro-item'><div class='intro-dot'></div>Escolha a afirmação mais próxima da realidade da sua empresa, não a ideal.</div>";
  html+="<div class='intro-item'><div class='intro-dot'></div>O resultado aparece imediatamente na tela ao final.</div>";
  html+="</div>";
  html+="<div class='intro-privacy'><strong>Privacidade:</strong> este diagnóstico não pede nome, e-mail ou empresa, e nenhuma resposta é armazenada em servidor algum. Todo o cálculo acontece no seu navegador — ao fechar a página, nada permanece.</div>";
  html+="<div class='tnav'><div></div><button class='tbtn primary' id='btn-intro-next'>Iniciar diagnóstico →</button></div>";
  renderTool(html);
  R("btn-intro-next").addEventListener("click",function(){curD=0;respostas=[];for(var i=0;i<DIMS.length;i++){respostas.push([null,null,null]);}renderDim();});
}
function renderDim(){
  var d=DIMS[curD];
  var pct=Math.round(((curD+1)/DIMS.length)*100);
  var html="<div class='prog-label'>Dimensão "+(curD+1)+" de "+DIMS.length+"</div>";
  html+="<div class='prog-bar'><div class='prog-fill' style='width:"+pct+"%'></div></div>";
  html+="<div class='dim-header'><div class='dim-icon'>"+d.icon+"</div><div><div class='dim-title'>"+d.title+(d.critica?"<span class='critica-tag'>dimensão crítica</span>":"")+"</div><div class='dim-desc'>"+d.desc+"</div></div></div>";
  d.perguntas.forEach(function(q,qi){
    html+="<div class='question'><div class='q-text'>"+q.text+"</div><div class='opts'>";
    q.opts.forEach(function(op,oi){
      var s=(respostas[curD][qi]===(oi+1))?" sel":"";
      html+="<div class='opt"+s+"' data-qi='"+qi+"' data-val='"+(oi+1)+"'>"+op+"</div>";
    });
    html+="</div></div>";
  });
  html+="<div class='tnav'>";
  html+="<button class='tbtn' id='btn-back'"+(curD===0?" disabled":"")+"'>← Anterior</button>";
  html+="<span class='step-ind'>"+(curD+1)+"/"+DIMS.length+"</span>";
  html+="<button class='tbtn primary' id='btn-next'>"+(curD===DIMS.length-1?"Ver resultado →":"Próxima →")+"</button>";
  html+="</div>";
  renderTool(html);
  document.querySelectorAll("#tool-root .opt").forEach(function(el){
    el.addEventListener("click",function(){
      respostas[curD][parseInt(this.dataset.qi)]=parseInt(this.dataset.val);
      renderDim();
    });
  });
  R("btn-next").addEventListener("click",function(){
    if(respostas[curD].some(function(r){return r===null;})){alert("Responda todas as perguntas antes de continuar.");return;}
    if(curD<DIMS.length-1){curD++;renderDim();}else{mostrarResultado();}
  });
  R("btn-back").addEventListener("click",function(){if(curD>0){curD--;renderDim();}});
}
function dimScore(di){var s=0;respostas[di].forEach(function(v){s+=v||0;});return Math.round((s/respostas[di].length)*10)/10;}
function nivelInfo(sc){
  if(sc<1.8)return{label:"Difusa",bg:"rgba(226,115,75,0.18)",txt:"#F0AE8C"};
  if(sc<2.5)return{label:"Emergente",bg:"rgba(239,159,39,0.18)",txt:"#F5C87A"};
  if(sc<3.2)return{label:"Em Desenvolvimento",bg:"rgba(196,164,100,0.16)",txt:"#E8C87A"};
  if(sc<3.8)return{label:"Consolidada",bg:"rgba(196,164,100,0.22)",txt:"#E8C87A"};
  return{label:"Referência",bg:"rgba(196,164,100,0.3)",txt:"#F8F7F4"};
}
function tierOf(sc){return sc<2.5?"baixo":sc<3.5?"medio":"alto";}
var LEITURA_FECHO="Esse é o padrão que separa empresas que só planejam de empresas que executam: a diferença raramente está na ambição do plano, e sim na disciplina de conectar prioridades, recursos e acompanhamento no dia a dia.";
function buildLeituraExecutiva(scores){
  var idxMax=0,idxMin=0;
  for(var i=1;i<scores.length;i++){ if(scores[i]>scores[idxMax])idxMax=i; if(scores[i]<scores[idxMin])idxMin=i; }
  var equilibrado=(scores[idxMax]-scores[idxMin])<0.4;
  var html="<div class='exec-summary'><div class='exec-label'>Leitura executiva</div>";
  if(equilibrado){
    html+="<p>Seu perfil está relativamente equilibrado entre as 7 dimensões avaliadas, sem um ponto de força ou de fragilidade que se destaque isoladamente — o que também é uma informação útil: o desafio aqui não é uma dimensão específica, e sim elevar o patamar geral de maturidade do processo como um todo.</p>";
  } else {
    html+="<p>O ponto mais forte do seu perfil é <strong>"+DIMS[idxMax].title+"</strong> ("+scores[idxMax]+"/4): "+DIMS[idxMax].niveis[tierOf(scores[idxMax])].texto+"</p>";
    html+="<p>A maior oportunidade de evolução está em <strong>"+DIMS[idxMin].title+"</strong> ("+scores[idxMin]+"/4): "+DIMS[idxMin].niveis[tierOf(scores[idxMin])].texto+"</p>";
  }
  html+="<p>"+LEITURA_FECHO+"</p></div>";
  return html;
}
function buildPrioridades(scores){
  var idxs=DIMS.map(function(_,i){return i;});
  idxs.sort(function(a,b){return scores[a]-scores[b];});
  var p1=idxs[0],p2=idxs[1];
  var allStrong=scores[p1]>=3.5;
  var html="<div class='prior-wrap'>";
  if(allStrong){
    html+="<div class='prior-titulo'>✅ Sem prioridades críticas no momento</div><div class='prior-texto'>Mesmo as dimensões relativamente mais baixas do seu perfil já indicam uma base consolidada. Vale aprofundar:</div>";
  } else {
    html+="<div class='prior-titulo'>🎯 Prioridades imediatas</div><div class='prior-texto'>Estas duas dimensões merecem atenção antes das demais:</div>";
  }
  [p1,p2].forEach(function(i){
    var tier=tierOf(scores[i]);
    html+="<div class='prior-item'><div class='prior-item-title'>"+DIMS[i].title+" <span class='prior-score'>"+scores[i]+"/4</span></div><div class='prior-item-acao'>"+DIMS[i].niveis[tier].acao+"</div></div>";
  });
  html+="</div>";
  return html;
}
function mostrarResultado(){
  var scores=DIMS.map(function(_,i){return dimScore(i);});
  var media=Math.round((scores.reduce(function(a,b){return a+b;},0)/scores.length)*10)/10;
  var liIdx=DIMS.findIndex(function(d){return d.critica;});
  var liScore=scores[liIdx];
  var gated=liScore<2.5;
  var nv=nivelInfo(media);
  if(gated&&media>=3.2){nv=nivelInfo(3.1);} // aplica o teto de "Em Desenvolvimento"
  var dimRows=scores.map(function(s,i){
    var pct=Math.round((s/4)*100);
    var tag=DIMS[i].critica?(s<2.5?"<span class='tag-fail'>crítica — abaixo do mínimo</span>":"<span class='tag-ok'>crítica — ok</span>"):"";
    var nota=DIMS[i].niveis[tierOf(s)].texto;
    return "<div class='bar-block'><div class='bar-row'><div class='bar-label'>"+DIMS[i].title+tag+"</div><div class='bar-track'><div class='bar-fill' style='width:"+pct+"%'></div></div><div class='bar-val'>"+s+"/4</div></div><div class='bar-note'>"+nota+"</div></div>";
  }).join("");
  var fb="";
  if(gated){
    fb="<div class='alerta-wrap'><div class='alerta-titulo'>⚠️ Desdobramento em metas e iniciativas abaixo do mínimo</div><div class='alerta-texto'>"+DIMS[liIdx].alerta+"<br><br>Por isso, mesmo que outras dimensões pontuem bem, o nível geral reportado fica limitado a \"Em Desenvolvimento\" — sem esse desdobramento, o planejamento não se sustenta na prática.</div></div>";
  }
  fb+="<div class='export-wrap'><button class='tbtn outline' id='btn-print' onclick='window.print()'>🖨️ Baixar / imprimir este diagnóstico</button></div>";
  fb+="<div class='tcta-box'><p>Este é o terceiro diagnóstico da plataforma IME — Índice de Maturidade Executiva. Conheça os demais:</p>";
  fb+="<div class='platform-nav'>";
  fb+="<div class='platform-item'><a href='clareza-estrategica.html'>Clareza Estratégica — a empresa sabe para onde vai?</a><span class='platform-tag'>disponível</span></div>";
  fb+="<div class='platform-item'><a href='maturidade-gestao.html'>Maturidade de Gestão — a empresa tem o modelo de gestão para executar?</a><span class='platform-tag'>disponível</span></div>";
  fb+="<div class='platform-item'><a href='https://diagnostico.sebastiaonrs.com.br' target='_blank'>AI Ready — a empresa está pronta para IA?</a><span class='platform-tag'>disponível</span></div>";
  fb+="<div class='platform-item'><a href='prontidao-transformacao.html'>Prontidão para Transformação — a empresa consegue mudar quando precisa?</a><span class='platform-tag'>disponível</span></div>";
  fb+="</div>";
  fb+="<p style='margin-top:16px'>Diagnósticos como este ganham mais valor quando revisitados ao longo do tempo, acompanhando a evolução real da empresa. Se este resultado levantou algo que vale a pena aprofundar, sigo disponível para conversar no LinkedIn.</p><button class='tbtn primary' onclick=\"window.open('https://www.linkedin.com/in/sebastiao-nunes-rocha-de-souza','_blank')\">Conversar no LinkedIn ↗</button>";
  fb+="<button class='treiniciar' onclick='reiniciar()'>Refazer diagnóstico</button></div>";
  var html="<div style='text-align:center;margin-bottom:8px'><div class='r-badge' style='background:"+nv.bg+";color:"+nv.txt+"'>"+nv.label+"</div><div class='r-title'>Pontuação geral: "+media+"/4</div><div class='r-sub'>Veja abaixo a leitura completa do seu resultado.</div></div>";
  html+=buildLeituraExecutiva(scores);
  html+=buildPrioridades(scores);
  html+="<div class='radar-wrap'>"+buildRadarSVG(SHORT_LABELS,scores,liIdx)+"</div>";
  html+="<div style='margin-bottom:8px'>"+dimRows+"</div>"+fb;
  renderTool(html);
}
function reiniciar(){curD=0;respostas=[];for(var i=0;i<DIMS.length;i++){respostas.push([null,null,null]);}telaIntro();}
telaIntro();
</script>
