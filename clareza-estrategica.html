<script>
var DIMS=[
  {id:"proposito",title:"Propósito e Visão",desc:"Por que a empresa existe e onde quer chegar?",icon:"🧭",critica:false,
    perguntas:[
      {text:"A empresa tem uma declaração de propósito/visão formalizada?",opts:["Não existe visão declarada ou ela é ignorada no dia a dia.","Existe uma visão declarada, mas pouco lida ou aplicada.","A visão é conhecida pela liderança e referenciada ocasionalmente em decisões.","A visão é referência ativa em decisões estratégicas e reconhecida por toda a organização."]},
      {text:"Quando questionados separadamente, os principais executivos descrevem o propósito da empresa...",opts:["De formas claramente diferentes e às vezes contraditórias.","De formas parecidas, mas com ênfases distintas.","De forma consistente, com pequenas variações de linguagem.","De forma praticamente idêntica, com a mesma essência."]},
      {text:"A visão de longo prazo da empresa é revisitada...",opts:["Nunca, ou apenas quando exigido por processo formal burocrático.","Esporadicamente, sem cadência definida.","Anualmente, como parte do ciclo de planejamento.","Regularmente, e usada como critério ativo de avaliação de novas iniciativas."]}
    ],
    niveis:{
      baixo:{texto:"Sem uma visão declarada e usada de fato, as decisões do dia a dia ficam à mercê da interpretação individual de cada gestor — e a empresa perde a régua comum para dizer o que vale a pena perseguir.",acao:"Escreva (ou reescreva) o propósito em uma frase simples e use-a explicitamente na próxima decisão estratégica relevante, para testar se ela realmente orienta algo."},
      medio:{texto:"A visão existe e é conhecida pela liderança, mas ainda não é referenciada com frequência nas decisões concretas — funciona mais como moldura do que como bússola ativa.",acao:"Nas próximas decisões importantes, pergunte explicitamente: \"isso está alinhado com a nossa visão?\" até que o hábito se instale."},
      alto:{texto:"A visão já funciona como referência ativa nas decisões e é reconhecida pela organização — é uma base sólida para sustentar escolhas difíceis.",acao:"Revisite a visão periodicamente para garantir que ela continue verdadeira à medida que a empresa e o mercado mudam."}
    }
  },
  {id:"direcionamento",title:"Direcionamento Estratégico",desc:"As prioridades e pilares estão definidos?",icon:"🎯",critica:false,
    perguntas:[
      {text:"As prioridades estratégicas da empresa para os próximos 2-3 anos estão...",opts:["Não definidas ou definidas apenas informalmente.","Definidas, mas de forma genérica (\"crescer\", \"inovar\"), sem detalhamento.","Definidas com objetivos específicos, mas nem todos mensuráveis.","Definidas com objetivos específicos, mensuráveis e com donos claros."]},
      {text:"Quando um novo projeto ou investimento é proposto, a organização avalia sua aderência à estratégia...",opts:["Raramente ou nunca — decisões são tomadas caso a caso.","De forma informal, dependendo de quem está decidindo.","Com um processo estabelecido, mas nem sempre seguido.","Com um processo estabelecido e consistentemente aplicado."]},
      {text:"Os pilares estratégicos da empresa foram definidos...",opts:["Não existem pilares estratégicos definidos.","Existem, mas foram copiados/herdados sem adaptação à realidade da empresa.","Foram definidos com análise própria, mas sem revisão desde então.","Foram definidos com análise rigorosa e são revisados periodicamente."]}
    ],
    niveis:{
      baixo:{texto:"Sem prioridades específicas e mensuráveis, praticamente qualquer iniciativa pode ser justificada como \"estratégica\" — o que na prática significa que nada é, de fato, prioridade.",acao:"Defina no máximo 3 a 5 prioridades estratégicas para o ciclo atual, cada uma com um objetivo mensurável e um responsável."},
      medio:{texto:"As prioridades existem, mas ainda de forma genérica ou parcialmente mensurável — o que dificulta saber, com clareza, se estão sendo cumpridas.",acao:"Para cada prioridade já definida, adicione uma métrica numérica e um prazo — transforme intenção em compromisso verificável."},
      alto:{texto:"As prioridades estratégicas estão claramente definidas, com objetivos específicos, mensuráveis e donos — a organização sabe o que perseguir.",acao:"Use essas prioridades como filtro explícito para aceitar ou recusar novos projetos e investimentos."}
    }
  },
  {id:"posicionamento",title:"Posicionamento Competitivo",desc:"A diferenciação frente à concorrência é clara?",icon:"♟️",critica:false,
    perguntas:[
      {text:"A proposta de valor da empresa frente aos concorrentes é...",opts:["Não está clara nem para a liderança.","Está clara para a liderança, mas não é comunicada de forma consistente.","Está clara e comunicada, mas pouco diferenciada de concorrentes.","Está clara, comunicada e genuinamente diferenciada no mercado."]},
      {text:"A empresa monitora ativamente o posicionamento dos concorrentes...",opts:["Não monitora ou monitora de forma esporádica/informal.","Monitora informalmente, sem processo estruturado.","Tem um processo estruturado, mas usado de forma reativa.","Tem um processo estruturado e usa a informação proativamente nas decisões."]},
      {text:"Se perguntado a um cliente por que ele escolhe a empresa em vez de um concorrente, a liderança...",opts:["Não sabe responder com confiança.","Tem uma hipótese, mas nunca validou com clientes reais.","Tem uma resposta validada, mas desatualizada.","Tem uma resposta clara, validada e atualizada continuamente."]}
    ],
    niveis:{
      baixo:{texto:"Sem clareza sobre o que diferencia a empresa da concorrência, é difícil orientar decisões de produto, preço e comunicação — a empresa compete sem saber exatamente por que deveria vencer.",acao:"Entreviste 5 clientes recentes e pergunte diretamente por que escolheram sua empresa em vez de um concorrente — a resposta deles vale mais que qualquer hipótese interna."},
      medio:{texto:"A proposta de valor está clara para a liderança, mas ainda não é suficientemente diferenciada ou consistentemente comunicada no mercado.",acao:"Escolha um único atributo de diferenciação real e reforce-o de forma consistente em vendas, marketing e atendimento pelos próximos meses."},
      alto:{texto:"O posicionamento é claro, comunicado e genuinamente diferenciado — a empresa sabe por que vence, e o mercado percebe isso.",acao:"Monitore continuamente se concorrentes estão copiando esse diferencial, para renová-lo antes que ele se banalize."}
    }
  },
  {id:"lideranca",title:"Alinhamento da Liderança",desc:"O time executivo compartilha o mesmo entendimento?",icon:"🤝",critica:true,
    alerta:"Sem alinhamento entre os membros da liderança, nenhuma outra dimensão sustenta maturidade real. É o padrão de falha estratégica mais comum e mais silencioso em empresas brasileiras: discurso comum no papel, divergência real na hora de decidir.",
    perguntas:[
      {text:"Os membros da liderança, quando questionados individualmente sobre as prioridades da empresa...",opts:["Dão respostas claramente diferentes entre si.","Têm um discurso comum, mas divergem quando decisões concretas precisam ser tomadas.","Estão alinhados na maior parte das decisões, com raras exceções.","Demonstram alinhamento consistente, inclusive sob pressão ou em decisões de trade-off."]},
      {text:"Diante de uma decisão estratégica difícil (cortar um produto, mudar de mercado), a liderança...",opts:["Frequentemente trava por falta de consenso ou disputas de poder.","Chega a um consenso, mas com desgaste e demora significativos.","Chega a um consenso de forma relativamente ágil na maioria das vezes.","Decide de forma ágil e alinhada, mesmo em temas sensíveis."]},
      {text:"Conflitos entre áreas sobre prioridades estratégicas são...",opts:["Frequentes e não resolvidos, gerando trabalho duplicado ou contraditório.","Frequentes, mas resolvidos caso a caso pela hierarquia.","Raros, pois há entendimento comum sobre prioridades.","Praticamente inexistentes, pois a estratégia funciona como critério compartilhado de decisão."]}
    ],
    niveis:{
      baixo:{texto:"Quando a liderança diverge nas decisões concretas, mesmo tendo um discurso comum no papel, cada área passa a agir por conta própria — a estratégia perde força exatamente onde mais precisa dela: na hora de decidir.",acao:"Leve as 2 ou 3 decisões estratégicas mais divergentes entre os líderes para uma conversa explícita, com o objetivo único de alinhar — não de vencer o debate."},
      medio:{texto:"A liderança chega a um consenso, mas com desgaste e demora — o que atrasa decisões importantes e desgasta a relação entre os executivos.",acao:"Defina previamente um critério de decisão (por exemplo, o que a visão da empresa recomenda) para reduzir decisões baseadas em preferência pessoal ou poder de barganha."},
      alto:{texto:"A liderança decide de forma ágil e alinhada mesmo em temas sensíveis — isso é raro e é uma das maiores vantagens competitivas silenciosas de uma empresa.",acao:"Proteja esse alinhamento formalizando os critérios de decisão usados, para que sobrevivam a trocas na equipe executiva."}
    }
  },
  {id:"disseminacao",title:"Disseminação e Compreensão",desc:"A estratégia é conhecida além do C-level?",icon:"📣",critica:false,
    perguntas:[
      {text:"Se perguntado a um gerente de nível médio qual é a estratégia da empresa, ele...",opts:["Não saberia responder ou daria uma resposta genérica.","Saberia responder parcialmente, com lacunas relevantes.","Saberia responder com razoável precisão.","Saberia responder com precisão e conectar ao seu trabalho diário."]},
      {text:"A estratégia da empresa é comunicada aos times...",opts:["Não é comunicada de forma estruturada.","É comunicada uma vez (ex: reunião anual), sem reforço.","É comunicada e reforçada periodicamente.","É comunicada, reforçada e traduzida em metas específicas para cada time."]},
      {text:"Colaboradores conseguem explicar como o trabalho deles contribui para a estratégia da empresa...",opts:["Não, a maioria não vê conexão entre seu trabalho e a estratégia.","Apenas lideranças conseguem fazer essa conexão.","A maioria dos gestores consegue, mas não os times operacionais.","A maioria dos colaboradores, em todos os níveis, consegue fazer essa conexão."]}
    ],
    niveis:{
      baixo:{texto:"Se a estratégia não é compreendida além do C-level, ela não orienta o trabalho de quem está mais perto do cliente e da operação — a execução acontece de forma desconectada do que a liderança pretende.",acao:"Traduza as prioridades estratégicas em uma linguagem simples e comunique-as diretamente aos gestores de nível médio, não apenas em apresentações formais."},
      medio:{texto:"A estratégia é comunicada, mas de forma pontual — sem reforço contínuo, o entendimento se dilui com o tempo e a rotatividade de pessoas.",acao:"Reforce a estratégia em pelo menos um rito recorrente (reunião mensal, comunicado, etc.), não apenas uma vez por ano."},
      alto:{texto:"A estratégia é compreendida e conectada ao trabalho diário em diferentes níveis da organização — isso multiplica a capacidade de execução sem exigir controle centralizado.",acao:"Use histórias reais de colaboradores conectando seu trabalho à estratégia como forma de reforçar e disseminar ainda mais esse entendimento."}
    }
  },
  {id:"foco",title:"Foco e Priorização",desc:"A empresa consegue dizer não e evitar dispersão?",icon:"🔍",critica:false,
    perguntas:[
      {text:"Quando surgem oportunidades atrativas fora do escopo estratégico definido, a empresa...",opts:["Costuma persegui-las mesmo assim, gerando dispersão frequente.","Às vezes persegue, dependendo de quem propõe ou pressiona.","Avalia com critério, mas ocasionalmente cede à dispersão.","Avalia com critério rigoroso e recusa com disciplina o que foge do foco."]},
      {text:"O número de iniciativas estratégicas em andamento simultaneamente é...",opts:["Muito alto, sem capacidade real de acompanhar todas.","Alto, com sobrecarga perceptível das equipes.","Administrável, com atenção adequada à maioria.","Calibrado à capacidade real de execução da organização."]},
      {text:"Decisões de \"parar de fazer algo\" (descontinuar produtos, projetos, mercados) são...",opts:["Raras — a empresa tende a acumular iniciativas sem encerrar as antigas.","Acontecem, mas de forma reativa a crises.","Acontecem como parte do planejamento, mas com resistência.","Fazem parte natural da disciplina estratégica da empresa."]}
    ],
    niveis:{
      baixo:{texto:"Sem disciplina para recusar oportunidades fora do escopo, a empresa se dispersa entre iniciativas demais — e a execução de cada uma sofre pela divisão de atenção e recursos.",acao:"Na próxima oportunidade atrativa fora do escopo estratégico, pratique dizer não explicitamente e registre o motivo — isso cria disciplina coletiva com o tempo."},
      medio:{texto:"A empresa avalia oportunidades com algum critério, mas ainda cede ocasionalmente à dispersão — o que gera picos de sobrecarga difíceis de prever.",acao:"Estabeleça um limite máximo de iniciativas estratégicas simultâneas e só adicione uma nova removendo outra."},
      alto:{texto:"A empresa recusa com disciplina o que foge do foco definido — isso é um diferencial raro e protege a capacidade real de entrega.",acao:"Reforce essa disciplina compartilhando publicamente os motivos por trás de recusas estratégicas importantes, para reforçar a cultura de foco."}

  },
  {id:"consistencia",title:"Consistência ao Longo do Tempo",desc:"A estratégia se mantém estável diante de pressões?",icon:"⏳",critica:false,
    perguntas:[
      {text:"Nos últimos 2-3 anos, as prioridades estratégicas da empresa...",opts:["Mudaram com frequência, sem lógica clara de continuidade.","Mudaram algumas vezes, geralmente por pressão externa.","Se mantiveram em geral, com ajustes pontuais justificados.","Se mantiveram coerentes, com evolução clara e intencional."]},
      {text:"Trocas de liderança (executivos, diretores) na empresa costumam...",opts:["Provocar mudanças bruscas de direção estratégica.","Gerar alguma instabilidade nas prioridades por um período.","Ter impacto limitado na estratégia geral.","Não afetar a coerência estratégica, que é maior que qualquer indivíduo."]},
      {text:"Comparando o discurso estratégico da empresa hoje com o de dois anos atrás, percebe-se...",opts:["Pouca ou nenhuma relação entre os dois.","Alguma relação, mas com mudanças relevantes de direção.","Uma evolução natural, mantendo a essência.","Uma continuidade clara, com aprofundamento e refinamento ao longo do tempo."]}
    ],
    niveis:{
      baixo:{texto:"Quando as prioridades mudam com frequência e sem lógica de continuidade, a organização aprende a não levar a estratégia a sério — \"essa também vai mudar\" se torna a reação padrão.",acao:"Antes de anunciar uma nova prioridade estratégica, avalie explicitamente o que ela preserva (não só o que muda) em relação ao ciclo anterior."},
      medio:{texto:"A estratégia se mantém em geral, mas com ajustes pontuais nem sempre bem explicados — o que gera alguma dúvida sobre se há, de fato, uma linha de continuidade.",acao:"Ao comunicar ajustes na estratégia, explique explicitamente o que continua igual, não apenas o que muda."},
      alto:{texto:"A estratégia mantém coerência ao longo do tempo, com evolução clara e intencional — isso constrói confiança interna de que o rumo é real, não modismo.",acao:"Documente a evolução da estratégia ano a ano, para que a continuidade fique visível mesmo com trocas de liderança."}
    }

];
var SHORT_LABELS=["Propósito","Direcionamento","Posicionamento","Liderança","Disseminação","Foco","Consistência"];
function buildRadarSVG(labels,scores,criticalIdx){
  var n=labels.length;
  var size=320,center=size/2,maxR=center-72;
  function pt(i,ratio){
    var angle=(Math.PI*2*i/n)-Math.PI/2;
    return [center+ratio*maxR*Math.cos(angle),center+ratio*maxR*Math.sin(angle)];
  }
  var svg="<svg viewBox='0 0 "+size+" "+size+"' class='radar-svg'>";
  [1,2,3,4].forEach(function(level){
    var ratio=level/4,pts=[];
    for(var i=0;i<n;i++){var p=pt(i,ratio);pts.push(p[0].toFixed(1)+","+p[1].toFixed(1));}
    svg+="<polygon points='"+pts.join(" ")+"' class='radar-grid'/>";
  });
  for(var i=0;i<n;i++){
    var p=pt(i,1);
    svg+="<line x1='"+center+"' y1='"+center+"' x2='"+p[0].toFixed(1)+"' y2='"+p[1].toFixed(1)+"' class='radar-axis'/>";
  }
  var dpts=[];
  for(var i=0;i<n;i++){var ratio=scores[i]/4;var p=pt(i,ratio);dpts.push(p[0].toFixed(1)+","+p[1].toFixed(1));}
  svg+="<polygon points='"+dpts.join(" ")+"' class='radar-data'/>";
  for(var i=0;i<n;i++){var ratio=scores[i]/4;var p=pt(i,ratio);svg+="<circle cx='"+p[0].toFixed(1)+"' cy='"+p[1].toFixed(1)+"' r='4' class='radar-dot"+(i===criticalIdx?" radar-dot-critical":"")+"'/>";}
  for(var i=0;i<n;i++){
    var p=pt(i,1.24);
    var anchor="middle";
    if(p[0]<center-12)anchor="end"; else if(p[0]>center+12)anchor="start";
    svg+="<text x='"+p[0].toFixed(1)+"' y='"+p[1].toFixed(1)+"' text-anchor='"+anchor+"' class='radar-label"+(i===criticalIdx?" radar-label-critical":"")+"' dominant-baseline='middle'>"+labels[i]+"</text>";
  }
  svg+="</svg>";
  return svg;
}
var curD=0;
var respostas=[];
for(var i=0;i<DIMS.length;i++){respostas.push([null,null,null]);}
function R(id){return document.getElementById(id);}
function renderTool(html){R("tool-root").innerHTML=html;}
function telaIntro(){
  var html="<h2>Antes de começar</h2>";
  html+="<div class='intro-list'>";
  html+="<div class='intro-item'><div class='intro-dot'></div>7 dimensões, 3 perguntas cada — cerca de 10 minutos.</div>";
  html+="<div class='intro-item'><div class='intro-dot'></div>Escolha a afirmação mais próxima da realidade da sua empresa, não a ideal.</div>";
  html+="<div class='intro-item'><div class='intro-dot'></div>O resultado aparece imediatamente na tela ao final.</div>";
  html+="</div>";
  html+="<div class='intro-privacy'><strong>Privacidade:</strong> este diagnóstico não pede nome, e-mail ou empresa, e nenhuma resposta é armazenada em servidor algum. Todo o cálculo acontece no seu navegador — ao fechar a página, nada permanece.</div>";
  html+="<div class='tnav'><div></div><button class='tbtn primary' id='btn-intro-next'>Iniciar diagnóstico →</button></div>";
  renderTool(html);
  R("btn-intro-next").addEventListener("click",function(){curD=0;respostas=[];for(var i=0;i<DIMS.length;i++){respostas.push([null,null,null]);}renderDim();});
}
function renderDim(){
  var d=DIMS[curD];
  var pct=Math.round(((curD+1)/DIMS.length)*100);
  var html="<div class='prog-label'>Dimensão "+(curD+1)+" de "+DIMS.length+"</div>";
  html+="<div class='prog-bar'><div class='prog-fill' style='width:"+pct+"%'></div></div>";
  html+="<div class='dim-header'><div class='dim-icon'>"+d.icon+"</div><div><div class='dim-title'>"+d.title+(d.critica?"<span class='critica-tag'>dimensão crítica</span>":"")+"</div><div class='dim-desc'>"+d.desc+"</div></div></div>";
  d.perguntas.forEach(function(q,qi){
    html+="<div class='question'><div class='q-text'>"+q.text+"</div><div class='opts'>";
    q.opts.forEach(function(op,oi){
      var s=(respostas[curD][qi]===(oi+1))?" sel":"";
      html+="<div class='opt"+s+"' data-qi='"+qi+"' data-val='"+(oi+1)+"'>"+op+"</div>";
    });
    html+="</div></div>";
  });
  html+="<div class='tnav'>";
  html+="<button class='tbtn' id='btn-back'"+(curD===0?" disabled":"")+"'>← Anterior</button>";
  html+="<span class='step-ind'>"+(curD+1)+"/"+DIMS.length+"</span>";
  html+="<button class='tbtn primary' id='btn-next'>"+(curD===DIMS.length-1?"Ver resultado →":"Próxima →")+"</button>";
  html+="</div>";
  renderTool(html);
  document.querySelectorAll("#tool-root .opt").forEach(function(el){
    el.addEventListener("click",function(){
      respostas[curD][parseInt(this.dataset.qi)]=parseInt(this.dataset.val);
      renderDim();
    });
  });
  R("btn-next").addEventListener("click",function(){
    if(respostas[curD].some(function(r){return r===null;})){alert("Responda todas as perguntas antes de continuar.");return;}
    if(curD<DIMS.length-1){curD++;renderDim();}else{mostrarResultado();}
  });
  R("btn-back").addEventListener("click",function(){if(curD>0){curD--;renderDim();}});
}
function dimScore(di){var s=0;respostas[di].forEach(function(v){s+=v||0;});return Math.round((s/respostas[di].length)*10)/10;}
function nivelInfo(sc){
  if(sc<1.8)return{label:"Difusa",bg:"rgba(226,115,75,0.18)",txt:"#F0AE8C"};
  if(sc<2.5)return{label:"Emergente",bg:"rgba(239,159,39,0.18)",txt:"#F5C87A"};
  if(sc<3.2)return{label:"Em Desenvolvimento",bg:"rgba(196,164,100,0.16)",txt:"#E8C87A"};
  if(sc<3.8)return{label:"Consolidada",bg:"rgba(196,164,100,0.22)",txt:"#E8C87A"};
  return{label:"Referência",bg:"rgba(196,164,100,0.3)",txt:"#F8F7F4"};
}
function tierOf(sc){return sc<2.5?"baixo":sc<3.5?"medio":"alto";}
var LEITURA_FECHO="Esse é o teste real de clareza estratégica: não é o quanto a visão soa bem em uma apresentação, e sim o quanto ela efetivamente orienta decisões difíceis no dia a dia, em todos os níveis da organização.";
function buildLeituraExecutiva(scores){
  var idxMax=0,idxMin=0;
  for(var i=1;i<scores.length;i++){ if(scores[i]>scores[idxMax])idxMax=i; if(scores[i]<scores[idxMin])idxMin=i; }
  var equilibrado=(scores[idxMax]-scores[idxMin])<0.4;
  var html="<div class='exec-summary'><div class='exec-label'>Leitura executiva</div>";
  if(equilibrado){
    html+="<p>Seu perfil está relativamente equilibrado entre as 7 dimensões avaliadas, sem um ponto de força ou de fragilidade que se destaque isoladamente — o que também é uma informação útil: o desafio aqui não é uma dimensão específica, e sim elevar o patamar geral de clareza estratégica como um todo.</p>";
  } else {
    html+="<p>O ponto mais forte do seu perfil é <strong>"+DIMS[idxMax].title+"</strong> ("+scores[idxMax]+"/4): "+DIMS[idxMax].niveis[tierOf(scores[idxMax])].texto+"</p>";
    html+="<p>A maior oportunidade de evolução está em <strong>"+DIMS[idxMin].title+"</strong> ("+scores[idxMin]+"/4): "+DIMS[idxMin].niveis[tierOf(scores[idxMin])].texto+"</p>";
  }
  html+="<p>"+LEITURA_FECHO+"</p></div>";
  return html;
}
function buildPrioridades(scores){
  var idxs=DIMS.map(function(_,i){return i;});
  idxs.sort(function(a,b){return scores[a]-scores[b];});
  var p1=idxs[0],p2=idxs[1];
  var allStrong=scores[p1]>=3.5;
  var html="<div class='prior-wrap'>";
  if(allStrong){
    html+="<div class='prior-titulo'>✅ Sem prioridades críticas no momento</div><div class='prior-texto'>Mesmo as dimensões relativamente mais baixas do seu perfil já indicam uma base consolidada. Vale aprofundar:</div>";
  } else {
    html+="<div class='prior-titulo'>🎯 Prioridades imediatas</div><div class='prior-texto'>Estas duas dimensões merecem atenção antes das demais:</div>";
  }
  [p1,p2].forEach(function(i){
    var tier=tierOf(scores[i]);
    html+="<div class='prior-item'><div class='prior-item-title'>"+DIMS[i].title+" <span class='prior-score'>"+scores[i]+"/4</span></div><div class='prior-item-acao'>"+DIMS[i].niveis[tier].acao+"</div></div>";
  });
  html+="</div>";
  return html;
}
function mostrarResultado(){
  var scores=DIMS.map(function(_,i){return dimScore(i);});
  var media=Math.round((scores.reduce(function(a,b){return a+b;},0)/scores.length)*10)/10;
  var liIdx=DIMS.findIndex(function(d){return d.critica;});
  var liScore=scores[liIdx];
  var gated=liScore<2.5;
  var nv=nivelInfo(media);
  if(gated&&media>=3.2){nv=nivelInfo(3.1);} // aplica o teto de "Em Desenvolvimento"
  var dimRows=scores.map(function(s,i){
    var pct=Math.round((s/4)*100);
    var tag=DIMS[i].critica?(s<2.5?"<span class='tag-fail'>crítica — abaixo do mínimo</span>":"<span class='tag-ok'>crítica — ok</span>"):"";
    var nota=DIMS[i].niveis[tierOf(s)].texto;
    return "<div class='bar-block'><div class='bar-row'><div class='bar-label'>"+DIMS[i].title+tag+"</div><div class='bar-track'><div class='bar-fill' style='width:"+pct+"%'></div></div><div class='bar-val'>"+s+"/4</div></div><div class='bar-note'>"+nota+"</div></div>";
  }).join("");
  var fb="";
  if(gated){
    fb="<div class='alerta-wrap'><div class='alerta-titulo'>⚠️ Alinhamento da liderança abaixo do mínimo</div><div class='alerta-texto'>"+DIMS[liIdx].alerta+"<br><br>Por isso, mesmo que outras dimensões pontuem bem, o nível geral reportado fica limitado a \"Em Desenvolvimento\" — sem esse alinhamento, a clareza estratégica não se sustenta na prática.</div></div>";
  }
  fb+="<div class='export-wrap'><button class='tbtn outline' id='btn-print' onclick='window.print()'>🖨️ Baixar / imprimir este diagnóstico</button></div>";
  fb+="<div class='tcta-box'><p>Este é o primeiro diagnóstico da plataforma IME — Índice de Maturidade Executiva. Conheça os demais:</p>";
  fb+="<div class='platform-nav'>";
  fb+="<div class='platform-item'><a href='https://diagnostico.sebastiaonrs.com.br' target='_blank'>AI Ready — a empresa está pronta para IA?</a><span class='platform-tag'>disponível</span></div>";
  fb+="<div class='platform-item'><a href='maturidade-gestao.html'>Maturidade de Gestão — a empresa tem o modelo de gestão para executar?</a><span class='platform-tag'>disponível</span></div>";
  fb+="<div class='platform-item'><a href='planejamento-estrategico.html'>Planejamento Estratégico — a empresa transforma visão em planos executáveis?</a><span class='platform-tag'>disponível</span></div>";
  fb+="<div class='platform-item'><span style='color:var(--slate)'>Prontidão para Transformação</span><span class='platform-tag'>em breve</span></div>";
  fb+="</div>";
  fb+="<p style='margin-top:16px'>Diagnósticos como este ganham mais valor quando revisitados ao longo do tempo, acompanhando a evolução real da empresa. Se este resultado levantou algo que vale a pena aprofundar, sigo disponível para conversar no LinkedIn.</p><button class='tbtn primary' onclick=\"window.open('https://www.linkedin.com/in/sebastiao-nunes-rocha-de-souza','_blank')\">Conversar no LinkedIn ↗</button>";
  fb+="<button class='treiniciar' onclick='reiniciar()'>Refazer diagnóstico</button></div>";
  var html="<div style='text-align:center;margin-bottom:8px'><div class='r-badge' style='background:"+nv.bg+";color:"+nv.txt+"'>"+nv.label+"</div><div class='r-title'>Pontuação geral: "+media+"/4</div><div class='r-sub'>Veja abaixo a leitura completa do seu resultado.</div></div>";
  html+=buildLeituraExecutiva(scores);
  html+=buildPrioridades(scores);
  html+="<div class='radar-wrap'>"+buildRadarSVG(SHORT_LABELS,scores,liIdx)+"</div>";
  html+="<div style='margin-bottom:8px'>"+dimRows+"</div>"+fb;
  renderTool(html);
}
function reiniciar(){curD=0;respostas=[];for(var i=0;i<DIMS.length;i++){respostas.push([null,null,null]);}telaIntro();}
telaIntro();
</script>
